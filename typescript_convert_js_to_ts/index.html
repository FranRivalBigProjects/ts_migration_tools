<script>
  // ── Sample ────────────────────────────────────────────
  function loadSample() {
    document.getElementById('jsInput').value =
`// User service module
var API_URL = "https://api.example.com";
var retryCount = 0;

function fetchUser(id, options) {
  retryCount++;
  var url = API_URL + "/users/" + id;
  var headers = options.headers || {};
  return fetch(url, { headers: headers });
}

function processUsers(users) {
  var result = [];
  users.forEach(function(user) {
    if (user.active == true) {
      result.push(user.name);
    }
  });
  return result;
}

var formatName = function(first, last) {
  if (first == null || last == null) {
    return "Unknown";
  }
  return first + " " + last;
};

class UserManager {
  constructor(config) {
    this.config = config;
    this.users = [];
    this.cache = {};
  }

  addUser(user) {
    if (user.id != undefined) {
      this.users.push(user);
    }
  }

  getUser(id) {
    var cached = this.cache[id];
    if (cached != null) return cached;
    return this.users.find(u => u.id == id);
  }
}`;
  }

  function clearAll() {
    document.getElementById('jsInput').value = '';
    document.getElementById('tsOutput').innerHTML = '<div class="output-placeholder">TypeScript output will appear here</div>';
    document.getElementById('result').classList.remove('visible');
    document.getElementById('copyBtn').style.display = 'none';
  }

  // ── Escape HTML ───────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Simple syntax highlight ───────────────────────────
  function highlight(code) {
    const keywords = /\b(const|let|var|function|return|class|new|this|if|else|for|while|of|in|import|export|default|extends|implements|interface|type|enum|async|await|void|unknown|never|any|true|false|null|undefined|typeof|instanceof)\b/g;
    const types     = /\b(string|number|boolean|object|symbol|bigint|Array|Promise|Record|Partial|Required|Readonly|Pick|Omit)\b/g;
    const strings   = /(["'`])(?:(?!\1)[^\\]|\\.)*\1/g;
    const comments  = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g;
    const fns       = /\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=\()/g;
    const nums      = /\b(\d+(?:\.\d+)?)\b/g;

    // order matters — comments first
    return esc(code)
      .replace(comments, m => `<span class="cmt">${m}</span>`)
      .replace(strings,  m => `<span class="str">${m}</span>`)
      .replace(keywords, m => `<span class="kw">${m}</span>`)
      .replace(types,    m => `<span class="type">${m}</span>`)
      .replace(fns,      (m, name) => `<span class="fn">${name}</span>(`)
      .replace(nums,     m => `<span class="num">${m}</span>`);
  }

  // ── Detect if var is reassigned in scope ──────────────
  function isReassigned(varName, lines, declLine) {
    const re = new RegExp(`\\b${varName}\\s*=(?!=)`, 'g');
    for (let i = declLine + 1; i < lines.length; i++) {
      const l = lines[i].trim();
      if (l.startsWith('//')) continue;
      re.lastIndex = 0;
      if (re.test(l)) return true;
    }
    return false;
  }

  // ── Main converter ────────────────────────────────────
  function convert() {
    const js = document.getElementById('jsInput').value;
    if (!js.trim()) { alert('Please paste some JavaScript code first.'); return; }

    const optVar      = document.getElementById('opt_var').checked;
    const optEq       = document.getElementById('opt_eq').checked;
    const optFn       = document.getElementById('opt_fn').checked;
    const optArrow    = document.getElementById('opt_arrow').checked;
    const optClass    = document.getElementById('opt_class').checked;
    const optComments = document.getElementById('opt_comments').checked;

    const lines  = js.split('\n');
    const output = [];
    const changes = [];
    let varCount = 0, eqCount = 0, fnCount = 0, arrowCount = 0;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      const trimmed = line.trim();
      const indent  = line.match(/^(\s*)/)[1];

      // ── Skip comment lines ──
      if (trimmed.startsWith('//') || trimmed.startsWith('*') || trimmed.startsWith('/*')) {
        output.push(line);
        continue;
      }

      // ── var → const / let ──
      if (optVar && /\bvar\s+(\w+)/.test(trimmed)) {
        const varName = trimmed.match(/\bvar\s+(\w+)/)[1];
        const reassigned = isReassigned(varName, lines, i);
        const replacement = reassigned ? 'let' : 'const';
        line = line.replace(/\bvar\b/, replacement);
        varCount++;
        changes.push({
          cls: 'c-applied',
          tag: 'Applied',
          text: `Line ${i+1}: \`var ${varName}\` → \`${replacement} ${varName}\`${reassigned ? ' (reassigned later)' : ' (never reassigned)'}`,
        });
      }

      // ── == → === ──
      if (optEq) {
        // replace != but not !==, == but not === or =>
        const before = line;
        line = line.replace(/([^!<>=])={2}(?!=)/g, '$1===');
        line = line.replace(/!={1}(?!=)/g, '!==');
        if (line !== before) {
          eqCount++;
          changes.push({ cls: 'c-applied', tag: 'Applied', text: `Line ${i+1}: Loose equality converted to strict equality.` });
        }
      }

      // ── function param annotations ──
      if (optFn && /^(export\s+)?function\s+\w+\s*\(/.test(trimmed)) {
        const hasReturn = lines.slice(i, Math.min(i + 30, lines.length))
          .join('\n').match(/return\s+[^;]/);
        const retType = hasReturn ? ': unknown' : ': void';

        // annotate untyped params
        const before = line;
        line = line.replace(
          /function\s+(\w+)\s*\(([^)]*)\)/,
          (m, name, params) => {
            const annotated = params
              .split(',')
              .map(p => {
                const t = p.trim();
                if (!t) return t;
                if (t.includes(':')) return p; // already typed
                const todo = optComments ? ' /* TODO: refine type */' : '';
                return `${p}: unknown${todo}`;
              })
              .join(',');
            return `function ${name}(${annotated})${retType}`;
          }
        );
        if (line !== before) {
          fnCount++;
          changes.push({ cls: 'c-applied', tag: 'Applied', text: `Line ${i+1}: Function parameters annotated with \`unknown\`; return type set to \`${retType.replace(': ','')}\`.` });
        }
      }

      // ── arrow fn annotations (const fn = (a, b) => ) ──
      if (optArrow && /(?:const|let)\s+\w+\s*=\s*(?:function\s*)?\(([^)]*)\)\s*(=>|\{)/.test(trimmed)) {
        const before = line;
        line = line.replace(
          /((?:const|let)\s+\w+\s*=\s*(?:function\s*)?\()([^)]*)(\)\s*(?:=>|\{))/,
          (m, pre, params, post) => {
            const annotated = params
              .split(',')
              .map(p => {
                const t = p.trim();
                if (!t || t.includes(':')) return p;
                const todo = optComments ? ' /* TODO: refine type */' : '';
                return `${p}: unknown${todo}`;
              })
              .join(',');
            return `${pre}${annotated}${post}`;
          }
        );
        if (line !== before) {
          arrowCount++;
          changes.push({ cls: 'c-applied', tag: 'Applied', text: `Line ${i+1}: Arrow function parameters annotated with \`unknown\`.` });
        }
      }

      // ── class property assignments (this.x = ...) ──
      if (optClass && /this\.\w+\s*=/.test(trimmed) && !trimmed.startsWith('//')) {
        if (optComments) {
          const propName = trimmed.match(/this\.(\w+)/)[1];
          // only add comment if not already there
          if (!line.includes('// TODO')) {
            line = line + ` // TODO: declare \`${propName}\` in class body with its type`;
          }
        }
      }

      output.push(line);
    }

    // Suggestions for manual work
    const suggestions = [];

    if (js.includes(': any') || js.includes(' any ')) {
      suggestions.push({ cls: 'c-suggest', tag: 'Suggest', text: 'Replace remaining \`any\` types with specific types or \`unknown\`. Use the Any Type Detector to find them.' });
    }

    if (/\.forEach|\.map|\.filter|\.reduce/.test(js)) {
      suggestions.push({ cls: 'c-suggest', tag: 'Suggest', text: 'Array methods detected. Add generic type parameters: \`.map<ResultType>(...)\` for full type safety.' });
    }

    if (/fetch\(|axios|http\./.test(js)) {
      suggestions.push({ cls: 'c-suggest', tag: 'Suggest', text: 'HTTP calls detected. Define response types as interfaces and use \`Promise<YourType>\` as the return type.' });
    }

    if (/class\s+\w+/.test(js)) {
      suggestions.push({ cls: 'c-manual', tag: 'Manual', text: 'Class detected. Add property type declarations in the class body before the constructor. Consider adding \`implements\` with an interface.' });
    }

    if (/require\(/.test(js)) {
      suggestions.push({ cls: 'c-manual', tag: 'Manual', text: 'CommonJS \`require()\` detected. Convert to ES module \`import\` syntax for full TypeScript compatibility.' });
    }

    // ── Render output ──
    const tsCode = output.join('\n');
    document.getElementById('tsOutput').innerHTML = highlight(tsCode);
    document.getElementById('copyBtn').style.display = 'block';

    // ── Report ──
    const allChanges = [...changes, ...suggestions];
    const totalChanges = varCount + eqCount + fnCount + arrowCount;

    const reportHTML = `
      <div class="divider"></div>
      <div class="report-grid">
        <div class="stat-card">
          <span class="stat-label">Total Changes</span>
          <span class="stat-value">${totalChanges}</span>
          <span class="stat-sub">auto-applied</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">var Replaced</span>
          <span class="stat-value">${varCount}</span>
          <span class="stat-sub">const / let</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Equality Fixed</span>
          <span class="stat-value">${eqCount}</span>
          <span class="stat-sub">== → ===</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Fns Annotated</span>
          <span class="stat-value">${fnCount + arrowCount}</span>
          <span class="stat-sub">params typed</span>
        </div>
      </div>
      ${allChanges.length > 0 ? `
        <p class="changelog-title">Conversion Log</p>
        <div class="changelog">
          ${allChanges.map(c => `
            <div class="change-row ${c.cls}">
              <span class="c-badge">${c.tag}</span>
              <span class="c-text">${c.text}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;

    const resultEl = document.getElementById('result');
    resultEl.innerHTML = reportHTML;
    resultEl.classList.add('visible');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Copy output ───────────────────────────────────────
  function copyOutput() {
    const el = document.getElementById('tsOutput');
    const text = el.innerText || el.textContent;
    navigator.clipboard.writeText(text)
      .then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      })
      .catch(() => alert('Copy failed. Please select and copy manually.'));
  }
</script>

</body>
</html>
